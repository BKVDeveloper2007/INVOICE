<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chalana Photography - Premium POS</title>
    
    <style>
        :root { 
            --primary: #e11d48; /* Premium Red */
            --primary-hover: #be123c;
            --dark-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            color: #f8fafc; 
            padding-bottom: 80px; 
        }

        .header-area { text-align: center; padding: 40px 0 20px 0; }
        .studio-name { font-size: 34px; font-weight: 900; color: white; letter-spacing: -1px; margin: 0; }
        .studio-name span { color: var(--primary); }
        .studio-sub { font-size: 11px; color: #94a3b8; letter-spacing: 4px; font-weight: bold; margin-top: 5px; }

        .content { flex: 1; padding: 15px; width: 100%; box-sizing: border-box; max-width: 800px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; color: var(--text-main); }
        h3 { color: var(--dark-bg); margin-top: 0; font-size: 18px; font-weight: 800; border-left: 5px solid var(--primary); padding-left: 10px; margin-bottom: 20px; text-transform: uppercase; }
        
        input, select { padding: 16px; border: 2px solid #e2e8f0; border-radius: 14px; outline: none; font-size: 15px; background: #f8fafc; width: 100%; box-sizing: border-box; margin-bottom: 12px; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1); }
        
        .main-btn { background: var(--primary); color: white; padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; width: 100%; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3); text-transform: uppercase; letter-spacing: 1px; }
        .main-btn:active { transform: scale(0.96); background: var(--primary-hover); }

        .cat-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .cat-row::-webkit-scrollbar { display: none; }
        .cat-badge { background: white; color: var(--dark-bg); padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: bold; border: 2px solid #e2e8f0; white-space: nowrap; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .cat-badge.active { background: var(--primary); color: white; border-color: var(--primary); }

        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-height: 45vh; overflow-y: auto; padding: 5px; }
        .item-tag { background: white; border: 1px solid #f1f5f9; padding: 20px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .item-tag:active { transform: scale(0.95); border-color: var(--primary); }
        .item-tag b { display: block; font-size: 14px; margin-bottom: 8px; color: var(--dark-bg); }
        .item-tag small { color: var(--primary); font-weight: 800; font-size: 14px; background: #fff1f2; padding: 4px 10px; border-radius: 8px; }

        .total-panel { background: var(--dark-bg); color: var(--primary); padding: 20px; border-radius: 20px; margin-top: 20px; text-align: right; border: 1px solid var(--primary); }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 2px solid var(--primary); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; background: none; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; margin-top: 5px; text-transform: uppercase; }

        /* --- 100% OFFLINE PRINT STYLES --- */
        #invoice-print-section { display: none; }
        
        @media print {
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            #invoice-print-section { display: block !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="header-area">
        <h1 class="studio-name">CHALANA <span>PHOTOGRAPHY</span></h1>
        <div class="studio-sub">PREMIUM VISION STUDIO</div>
    </div>

    <div class="content">
        <div id="billing" class="tab-content active">
            <div class="card">
                <h3>Select Services</h3>
                <div id="catList" class="cat-row"></div>
                <div id="tagGrid" class="item-grid"></div>
            </div>

            <div class="card">
                <h3>Billing Details</h3>
                <input type="text" id="custName" placeholder="Customer Name">
                <input type="tel" id="custPhone" placeholder="Phone Number">
                
                <div style="overflow-x: auto;">
                    <table style="width:100%; border-collapse: collapse; margin-top: 10px;">
                        <thead style="border-bottom: 2px solid #f1f5f9; text-align: left; font-size: 12px; color: #64748b; text-transform: uppercase;">
                            <tr><th style="padding: 10px;">Description</th><th style="padding: 10px; text-align: center;">Qty</th><th style="padding: 10px; text-align: right;">Amount</th><th style="padding: 10px;"></th></tr>
                        </thead>
                        <tbody id="billBody" style="font-size: 14px;"></tbody>
                    </table>
                </div>
                
                <div class="total-panel">
                    <small style="color: white; opacity: 0.7; text-transform: uppercase;">Grand Total:</small>
                    <h2 id="grandTotal" style="margin: 5px 0 0; font-size: 28px;">Rs. 0.00</h2>
                </div>
                <button class="main-btn" style="margin-top: 20px;" onclick="generateInvoicePDF()">Download / Print Invoice</button>
            </div>
        </div>

        <div id="inventory" class="tab-content">
            <div class="card">
                <h3>Add New Service</h3>
                <input type="text" id="itemName" placeholder="Service Name (e.g. Wedding Package)">
                <input type="text" id="itemCat" placeholder="Category (e.g. Packages, Prints)">
                <input type="number" id="itemPrice" placeholder="Price (Rs.)">
                <button class="main-btn" onclick="saveItem()">Add To List</button>
            </div>
            <div class="card">
                <h3>Current Services</h3>
                <div id="inventoryContainer"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showTab('billing')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"></path></svg>
            <span>Billing</span>
        </button>
        <button class="nav-item" onclick="showTab('inventory')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"></path></svg>
            <span>Items</span>
        </button>
    </nav>
</div>

<div id="invoice-print-section"></div>

<script>
    let inventory = JSON.parse(localStorage.getItem('chalana_en_data')) || [];
    let currentBill = [];
    let activeCategory = null;

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'billing') { renderCategories(); renderGrid(); }
        if(id === 'inventory') renderInventory();
    }

    function saveItem() {
        const name = document.getElementById('itemName').value.trim();
        const cat = document.getElementById('itemCat').value.trim() || "General";
        const price = parseFloat(document.getElementById('itemPrice').value);
        if(name && price) {
            inventory.push({ name, cat, price });
            localStorage.setItem('chalana_en_data', JSON.stringify(inventory));
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            renderInventory();
            alert("Service added successfully!");
        }
    }

    function renderInventory() {
        const container = document.getElementById('inventoryContainer');
        container.innerHTML = inventory.map((item, idx) => `
            <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #f1f5f9; align-items:center;">
                <div><b>${item.name}</b><br><small style="color:var(--primary);">${item.cat} | Rs. ${item.price.toFixed(2)}</small></div>
                <button onclick="deleteItem(${idx})" style="color:var(--primary); border:none; background:none; font-weight:bold; cursor:pointer; text-transform:uppercase;">Delete</button>
            </div>
        `).join('');
    }

    function deleteItem(idx) {
        if(confirm("Are you sure you want to delete this?")) {
            inventory.splice(idx, 1);
            localStorage.setItem('chalana_en_data', JSON.stringify(inventory));
            renderInventory();
        }
    }

    function renderCategories() {
        const cats = [...new Set(inventory.map(i => i.cat))];
        
        // Remove ALL logic. Auto-select the first category if current is not valid.
        if (cats.length > 0 && !cats.includes(activeCategory)) {
            activeCategory = cats[0];
        } else if (cats.length === 0) {
            activeCategory = null;
        }

        document.getElementById('catList').innerHTML = cats.map(c => `
            <div class="cat-badge ${activeCategory === c ? 'active' : ''}" onclick="activeCategory='${c}'; renderCategories(); renderGrid();">${c}</div>
        `).join('');
    }

    function renderGrid() {
        const grid = document.getElementById('tagGrid');
        const filtered = inventory.filter(i => i.cat === activeCategory);
        
        if (filtered.length === 0) {
            grid.innerHTML = `<p style="color:#94a3b8; font-size: 14px;">No services added yet. Please add from Items menu.</p>`;
            return;
        }

        grid.innerHTML = filtered.map(item => `
            <div class="item-tag" onclick="addToBill('${item.name.replace(/'/g, "\\'")}', ${item.price})">
                <b>${item.name}</b>
                <small>Rs. ${item.price.toFixed(2)}</small>
            </div>
        `).join('');
    }

    function addToBill(name, price) {
        const existing = currentBill.find(i => i.name === name);
        if(existing) {
            existing.qty++;
            existing.total = existing.qty * existing.price;
        } else {
            currentBill.push({ name, price, qty: 1, total: price });
        }
        renderBill();
    }

    function renderBill() {
        let gt = 0;
        document.getElementById('billBody').innerHTML = currentBill.map((item, idx) => {
            gt += item.total;
            return `
                <tr>
                    <td style="padding:12px;"><b>${item.name}</b></td>
                    <td style="text-align:center;">${item.qty}</td>
                    <td style="text-align:right; font-weight:bold;">${item.total.toFixed(2)}</td>
                    <td style="text-align:center; color:var(--primary); cursor:pointer; font-weight:bold;" onclick="currentBill.splice(${idx},1); renderBill();">X</td>
                </tr>`;
        }).join('');
        document.getElementById('grandTotal').innerText = `Rs. ${gt.toFixed(2)}`;
    }

    // 100% OFFLINE PDF GENERATOR
    function generateInvoicePDF() {
        if(currentBill.length === 0) return alert("Please add at least one service to the bill.");
        
        const customer = document.getElementById('custName').value || "Valued Customer";
        const phone = document.getElementById('custPhone').value || "-";
        const date = new Date().toLocaleDateString('en-GB');
        const invNo = "CP-" + Date.now().toString().slice(-6);
        const total = currentBill.reduce((a, b) => a + b.total, 0);

        let tableRows = currentBill.map(i => `
            <tr>
                <td style="padding: 12px 15px; border-bottom: 1px solid #e2e8f0; color: #1e293b;">${i.name}</td>
                <td style="padding: 12px 15px; border-bottom: 1px solid #e2e8f0; color: #1e293b; text-align: center;">${i.qty}</td>
                <td style="padding: 12px 15px; border-bottom: 1px solid #e2e8f0; color: #1e293b; text-align: right;">${i.price.toFixed(2)}</td>
                <td style="padding: 12px 15px; border-bottom: 1px solid #e2e8f0; color: #1e293b; text-align: right; font-weight: bold;">${i.total.toFixed(2)}</td>
            </tr>
        `).join('');

        const invoiceHTML = `
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 0 auto; background: white;">
                
                <div style="background-color: #0f172a; padding: 40px; border-bottom: 5px solid #e11d48;">
                    <h1 style="margin: 0; font-size: 38px; color: white; font-weight: 900; letter-spacing: -1px;">CHALANA <span style="color: #e11d48;">PHOTOGRAPHY</span></h1>
                    <p style="margin: 8px 0 0; font-size: 11px; letter-spacing: 3px; color: #94a3b8; font-weight: bold;">PREMIUM VISION STUDIO</p>
                    <p style="margin: 10px 0 0; font-size: 14px; color: white;">Contact: +94 77 400 3350</p>
                </div>

                <div style="padding: 40px; display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h3 style="margin: 0 0 10px; color: #0f172a; font-size: 14px; text-transform: uppercase;">Bill To:</h3>
                        <p style="margin: 0 0 5px; font-weight: bold; font-size: 20px; color: #1e293b;">${customer}</p>
                        <p style="margin: 0; color: #64748b; font-size: 14px;">Phone: ${phone}</p>
                    </div>
                    <div style="text-align: right;">
                        <h2 style="margin: 0 0 10px; font-size: 42px; color: #e11d48; font-weight: 900; letter-spacing: 2px;">INVOICE</h2>
                        <p style="margin: 0 0 5px; color: #64748b; font-size: 14px;">Invoice No: <b style="color: #1e293b;">#${invNo}</b></p>
                        <p style="margin: 0; color: #64748b; font-size: 14px;">Date: <b style="color: #1e293b;">${date}</b></p>
                    </div>
                </div>

                <div style="padding: 0 40px;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background-color: #0f172a;">
                                <th style="padding: 15px; text-align: left; color: white; font-size: 12px; letter-spacing: 1px;">DESCRIPTION</th>
                                <th style="padding: 15px; text-align: center; color: white; font-size: 12px; letter-spacing: 1px;">QTY</th>
                                <th style="padding: 15px; text-align: right; color: white; font-size: 12px; letter-spacing: 1px;">UNIT PRICE</th>
                                <th style="padding: 15px; text-align: right; color: white; font-size: 12px; letter-spacing: 1px;">TOTAL</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>

                <div style="padding: 30px 40px; display: flex; justify-content: flex-end;">
                    <div style="text-align: right; border-top: 2px solid #e11d48; padding-top: 15px; min-width: 250px;">
                        <p style="margin: 0 0 5px; font-size: 14px; color: #64748b; text-transform: uppercase; font-weight: bold;">Grand Total</p>
                        <h2 style="margin: 0; font-size: 32px; color: #e11d48;">Rs. ${total.toFixed(2)}</h2>
                    </div>
                </div>

                <div style="margin-top: 40px; padding: 40px; text-align: center; background-color: #f8fafc; border-top: 1px solid #e2e8f0;">
                    <p style="font-style: italic; margin: 0 0 8px; color: #1e293b; font-size: 14px; font-weight: bold;">Thank you for choosing Chalana Photography to capture your special moments.</p>
                    <p style="margin: 0; color: #64748b; font-size: 12px;">Payment can be made via Bank Transfer or Cash. Please retain this invoice for your records.</p>
                </div>
            </div>
        `;

        // Inject into print section
        document.getElementById('invoice-print-section').innerHTML = invoiceHTML;
        
        // Trigger browser's native print-to-pdf (Works completely offline)
        window.print();
    }

    // Init
    renderCategories();
    renderGrid();
</script>

</body>
</html>
